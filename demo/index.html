<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Reviews Widget — Demo</title>
  <link rel="stylesheet" href="../widget/reviews-widget.css">
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    h1 { font-size: 1.6rem; margin-bottom: 6px; }
    p  { color: #6b7280; margin-bottom: 32px; }
    h2 { font-size: 1.1rem; margin: 40px 0 16px; color: #374151; }
    section { max-width: 1100px; margin: 0 auto; }
    .dark-section {
      background: #0f172a;
      padding: 40px;
      border-radius: 16px;
      margin-top: 40px;
    }
    .dark-section h2 { color: #94a3b8; }
  </style>
</head>
<body>
<section>
  <h1>google-reviews-widget demo</h1>
  <p>Drop-in Google Reviews for any static website. No backend required.</p>

  <h2>Light theme</h2>
  <div id="reviews-light"></div>

  <div class="dark-section">
    <h2>Dark theme</h2>
    <div id="reviews-dark"></div>
  </div>
</section>

<script src="../widget/reviews-widget.js"></script>
<script>
  GoogleReviewsWidget.init({
    url:        './reviews.json',
    container:  '#reviews-light',
    max:        3,
    theme:      'light',
    showBanner: true,
  });

  GoogleReviewsWidget.init({
    url:        './reviews.json',
    container:  '#reviews-dark',
    max:        3,
    theme:      'dark',
    showBanner: true,
  });
</script>
</body>
</html>
